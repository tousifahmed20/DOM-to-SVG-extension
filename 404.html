<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e0e0f0;
      --muted: #555570;
      --glow: rgba(108, 99, 255, 0.4);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Starfield ── */
    canvas#stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Grid overlay ── */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Main layout ── */
    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }

    /* ── Glitch 404 ── */
    .glitch-wrap {
      position: relative;
      line-height: 1;
    }

    .glitch {
      font-size: clamp(6rem, 22vw, 14rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
      text-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow);
      position: relative;
      display: inline-block;
      animation: flicker 4s infinite;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .glitch::before {
      color: var(--accent2);
      clip-path: polygon(0 30%, 100% 30%, 100% 55%, 0 55%);
      transform: translate(-4px, 0);
      animation: glitch-a 3.5s infinite;
      opacity: 0.75;
    }

    .glitch::after {
      color: var(--accent);
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      transform: translate(4px, 0);
      animation: glitch-b 3.5s infinite;
      opacity: 0.75;
    }

    @keyframes glitch-a {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92%            { transform: translate(-6px,  2px); opacity: .8; }
      94%            { transform: translate( 4px, -2px); opacity: .8; }
      96%            { transform: translate(-2px,  4px); opacity: .8; }
    }

    @keyframes glitch-b {
      0%, 88%, 100% { transform: translate(0); opacity: 0; }
      90%            { transform: translate( 6px, -2px); opacity: .8; }
      92%            { transform: translate(-4px,  2px); opacity: .8; }
      96%            { transform: translate( 2px, -4px); opacity: .8; }
    }

    @keyframes flicker {
      0%, 97%, 100% { opacity: 1; }
      98%            { opacity: .85; }
      99%            { opacity: 1; }
      99.5%          { opacity: .7; }
    }

    /* ── Subtitle / message ── */
    .headline {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      animation: fadeUp .8s .2s both;
    }

    .subtext {
      font-size: clamp(.875rem, 2vw, 1.05rem);
      color: var(--muted);
      max-width: 38ch;
      line-height: 1.6;
      animation: fadeUp .8s .35s both;
    }

    /* ── Animated terminal line ── */
    .terminal {
      background: var(--surface);
      border: 1px solid rgba(108,99,255,.3);
      border-radius: 8px;
      padding: .6rem 1.2rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: clamp(.75rem, 1.8vw, .9rem);
      color: var(--accent2);
      display: flex;
      align-items: center;
      gap: .5rem;
      animation: fadeUp .8s .5s both;
    }

    .terminal .prompt { color: var(--accent); }
    .terminal .cursor {
      width: 2px; height: 1.1em;
      background: var(--accent2);
      animation: blink .9s step-end infinite;
      border-radius: 1px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .75rem 2rem;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
      letter-spacing: .05em;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 0 20px var(--glow);
      animation: fadeUp .8s .65s both;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.18) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform .5s;
    }

    .btn:hover::before { transform: translateX(100%); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 35px var(--glow); }
    .btn:active { transform: translateY(0); }

    /* ── Floating orbs (decorative) ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 380px; height: 380px;
      background: rgba(108,99,255,.15);
      top: -80px; left: -80px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 300px; height: 300px;
      background: rgba(255,101,132,.12);
      bottom: -60px; right: -60px;
      animation-delay: -6s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* ── Shared animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Orbit ring ── */
    .orbit-wrap {
      position: absolute;
      width: clamp(260px, 50vw, 420px);
      height: clamp(260px, 50vw, 420px);
      pointer-events: none;
      z-index: 1;
    }

    .orbit {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(108,99,255,.2);
      border-radius: 50%;
      animation: spin 18s linear infinite;
    }

    .orbit:nth-child(2) {
      inset: 20px;
      border-color: rgba(255,101,132,.15);
      animation-duration: 26s;
      animation-direction: reverse;
    }

    .dot {
      position: absolute;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      top: 50%; left: -4px;
      transform: translateY(-50%);
      box-shadow: 0 0 10px var(--accent);
    }

    .orbit:nth-child(2) .dot {
      background: var(--accent2);
      box-shadow: 0 0 10px var(--accent2);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- decorative rings behind the 404 -->
  <div class="orbit-wrap" aria-hidden="true" style="opacity:.5">
    <div class="orbit"><span class="dot"></span></div>
    <div class="orbit"><span class="dot"></span></div>
  </div>

  <main>
    <div class="glitch-wrap">
      <span class="glitch" data-text="404">404</span>
    </div>

    <p class="headline">Lost in the void</p>
    <p class="subtext">
      The page you're looking for drifted off into deep space.
      It may have been moved, deleted, or never existed.
    </p>

    <div class="terminal" aria-label="Error message">
      <span class="prompt">$</span>
      <span>GET /page &nbsp;→&nbsp; 404 Not Found</span>
      <span class="cursor" aria-hidden="true"></span>
    </div>

    <a href="/" class="btn">
      ← Back to Home
    </a>
  </main>

  <script>
    // Starfield
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initStars(n = 180) {
      stars = Array.from({ length: n }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        speed: Math.random() * 0.3 + 0.05,
        opacity: Math.random() * 0.7 + 0.2,
        twinkle: Math.random() * Math.PI * 2,
      }));
    }

    function draw(ts) {
      ctx.clearRect(0, 0, W, H);
      for (const s of stars) {
        s.twinkle += 0.015;
        const alpha = s.opacity * (0.6 + 0.4 * Math.sin(s.twinkle));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,220,255,${alpha})`;
        ctx.fill();
        // slow drift downward
        s.y += s.speed;
        if (s.y > H + 2) { s.y = -2; s.x = Math.random() * W; }
      }
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    requestAnimationFrame(draw);

    // Subtle parallax on mouse move
    const orbs = document.querySelectorAll('.orb');
    window.addEventListener('mousemove', e => {
      const cx = e.clientX / window.innerWidth  - 0.5;
      const cy = e.clientY / window.innerHeight - 0.5;
      orbs.forEach((orb, i) => {
        const factor = i === 0 ? 30 : -20;
        orb.style.transform = `translate(${cx * factor}px, ${cy * factor}px)`;
      });
    });
  </script>
</body>
</html>
