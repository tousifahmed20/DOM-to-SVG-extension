<!DOCTYPE html>
<!--
  generate_icons.html
  ────────────────────
  Open this file in any browser, click the button, and it will
  download the three PNG icon files you need for the extension:
    icons/icon16.png
    icons/icon48.png
    icons/icon128.png

  After downloading, move them into the dom-to-svg-extension/icons/ folder.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generate Extension Icons</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #eee;
           display: flex; flex-direction: column; align-items: center;
           padding: 40px; gap: 20px; }
    canvas { border: 1px solid #444; border-radius: 8px; }
    button { padding: 10px 24px; background: #6366f1; color: #fff;
             border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    .row { display: flex; gap: 20px; align-items: flex-end; }
    p { color: #888; font-size: 13px; }
  </style>
</head>
<body>

  <h1>Icon Generator</h1>
  <p>Click the button to download the three PNG icons needed for the extension.</p>

  <div class="row">
    <div><p>16×16</p><canvas id="c16" width="16" height="16"></canvas></div>
    <div><p>48×48</p><canvas id="c48" width="48" height="48"></canvas></div>
    <div><p>128×128</p><canvas id="c128" width="128" height="128"></canvas></div>
  </div>

  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    function drawIcon(canvas) {
      const s   = canvas.width;
      const ctx = canvas.getContext('2d');

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, '#6366f1');
      grad.addColorStop(1, '#4f46e5');
      ctx.fillStyle = grad;
      roundRect(ctx, 0, 0, s, s, s * 0.18);
      ctx.fill();

      // White bracket symbol  < >
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = s * 0.10;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';

      const p = s * 0.18;  // padding
      const m = s / 2;     // midpoint

      // Left angle bracket <
      ctx.beginPath();
      ctx.moveTo(m - p * 0.3, p);
      ctx.lineTo(p, m);
      ctx.lineTo(m - p * 0.3, s - p);
      ctx.stroke();

      // Right angle bracket >
      ctx.beginPath();
      ctx.moveTo(m + p * 0.3, p);
      ctx.lineTo(s - p, m);
      ctx.lineTo(m + p * 0.3, s - p);
      ctx.stroke();

      // Arrow ↓ in the middle
      ctx.lineWidth = s * 0.09;
      ctx.beginPath();
      ctx.moveTo(m, p * 0.9);
      ctx.lineTo(m, s - p * 0.9);
      ctx.moveTo(m - p * 0.4, s - p * 1.3);
      ctx.lineTo(m, s - p * 0.8);
      ctx.lineTo(m + p * 0.4, s - p * 1.3);
      ctx.stroke();
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function downloadCanvas(canvas, filename) {
      const a = document.createElement('a');
      a.href     = canvas.toDataURL('image/png');
      a.download = filename;
      a.click();
    }

    function downloadAll() {
      ['c16','c48','c128'].forEach(id => {
        const canvas = document.getElementById(id);
        drawIcon(canvas);
        downloadCanvas(canvas, `icon${canvas.width}.png`);
      });
    }

    // Draw previews on load
    ['c16','c48','c128'].forEach(id => drawIcon(document.getElementById(id)));
  </script>
</body>
</html>
