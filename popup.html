<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM → SVG Exporter</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ───────────────────────────────────────── -->
  <header>
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="1" width="20" height="20" rx="4" stroke="#6366f1" stroke-width="2"/>
        <path d="M5 11 L9 15 L17 7" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>DOM → SVG</span>
    </div>
    <span class="version">v1.0</span>
  </header>

  <!-- ── Status Banner ────────────────────────────────── -->
  <div id="status-banner" class="banner hidden"></div>

  <!-- ── Step 1 : Capture ─────────────────────────────── -->
  <section class="card" id="section-pick">
    <h2>1 · Capture</h2>

    <!-- PRIMARY ACTIONS: Full Page + Visible Screen -->
    <div class="capture-grid">
      <button id="btn-fullpage" class="btn btn-primary" title="Export the entire scrollable page">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 8h8M8 4v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Full Page
      </button>
      <button id="btn-viewport" class="btn btn-primary" title="Export only what is visible right now">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="3" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Visible Screen
      </button>
    </div>

    <!-- Select & Grab area -->
    <button id="btn-area-select" class="btn btn-secondary btn-block"
            title="Draw a rectangle to select any screen region">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <path d="M2 5V3h2M14 5V3h-2M2 11v2h2M14 11v2h-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="4" y="4" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 1.5"/>
      </svg>
      Select &amp; Grab Area
    </button>

    <!-- Shows which element is currently targeted -->
    <div id="selected-info" class="info-box hidden">
      <span class="label">Selected:</span>
      <code id="selected-tag"></code>
    </div>
  </section>

  <!-- ── Step 2 : Options ──────────────────────────────── -->
  <section class="card" id="section-options">
    <h2>2 · Options</h2>

    <label class="checkbox-row">
      <input type="checkbox" id="opt-include-children" checked />
      Include child elements
    </label>

    <label class="checkbox-row">
      <input type="checkbox" id="opt-include-images" checked />
      Embed images (Base64)
    </label>

    <label class="checkbox-row">
      <input type="checkbox" id="opt-include-shadows" checked />
      Render box-shadows &amp; filters
    </label>

    <label class="checkbox-row">
      <input type="checkbox" id="opt-shadow-dom" checked />
      Traverse Angular / Shadow DOM
    </label>
  </section>

  <!-- ── Step 3 : Export ──────────────────────────────── -->
  <section class="card" id="section-export">
    <h2>3 · Export</h2>

    <!-- SVG Preview thumbnail -->
    <div id="preview-container" class="hidden">
      <div id="svg-preview"></div>
      <p id="preview-size" class="dim"></p>
    </div>

    <div class="export-buttons">
      <button id="btn-generate" class="btn btn-primary" disabled>
        Generate SVG
      </button>
      <button id="btn-download" class="btn btn-success hidden">
        ↓ Download SVG
      </button>
      <button id="btn-copy-svg" class="btn btn-secondary hidden">
        Copy SVG
      </button>
    </div>

    <!-- Figma sub-section -->
    <div class="figma-section">
      <div class="figma-header">
        <img id="figma-logo-img" src="icons/figma-logo.svg" width="14" height="14" alt="Figma" />
        <span>Figma</span>
      </div>

      <div id="figma-not-connected">
        <p class="dim">Connect your Figma account to paste SVG directly into a file.</p>
        <button id="btn-figma-connect" class="btn btn-figma">
          Connect Figma
        </button>
      </div>

      <div id="figma-connected" class="hidden">
        <p class="connected-badge">✓ Connected as <strong id="figma-user"></strong></p>
        <button id="btn-figma-paste" class="btn btn-figma" disabled>
          Open in Figma (paste-ready)
        </button>
        <button id="btn-figma-disconnect" class="btn btn-ghost btn-small">Disconnect</button>
      </div>
    </div>
  </section>

  <!-- ── Progress ─────────────────────────────────────── -->
  <div id="progress-bar" class="hidden">
    <div id="progress-fill"></div>
  </div>

  <script src="figma_uploader.js"></script>
  <script src="popup.js"></script>
</body>
</html>
